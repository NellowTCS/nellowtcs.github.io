<!DOCTYPE html>
<html lang="en-US" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Homepage</title>
  <!-- Removed Google Fonts; using system fonts from CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- Assuming Font Awesome for social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <div id="page" class="site">
    <header class="masthead">
      <div class="masthead__inner-wrap">
        <h href="{{ '/projects/' | relative_url }}" class="site-title" rel="home">My Projects</h>
      </div>
    </header>

    <main id="main" class="main-content initial-content" aria-label="Content">
      <div class="page__inner-wrap container">
        <div class="content">
          <div class="archive">
            <section class="project archive__item" data-search>
              <h2 class="archive__item-title">HTMLEditor</h2>
              <div class="archive__item-excerpt">
                <p>A basic drag and drop editor for HTML, JS, and CSS</p>
              </div>
              <p><a class="btn btn--primary" href="{{ '/abouthtmleditor.html' | relative_url }}">Read more</a></p>
            </section>
            <section class="project archive__item" data-search>
              <h2 class="archive__item-title">Project 2</h2>
              <div class="archive__item-excerpt">
                <p>Description of Project 2.</p>
              </div>
              <p><a class="btn btn--primary" href="{{ '/project2.html' | relative_url }}">Read more</a></p>
            </section>
          </div>
        </div>
      </div>
    </main>

    <footer class="page__footer site-footer">
      <div class="page__footer-inner container">
        <p class="page__footer-copyright">&copy; 2025 NellowTCS. All rights reserved.</p>
        <ul class="social-icons">
          <!-- Add your social links here -->
          <li><a href="https://twitter.com/yourusername" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa fa-twitter"></i></a></li>
          <li><a href="https://github.com/yourusername" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa fa-github"></i></a></li>
        </ul>
      </div>
    </footer>
  </div>

  <!-- JavaScript for navigation toggle (simplified) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.querySelector('.site-nav__toggle');
      const navList = document.querySelector('.nav-list');
      toggle.addEventListener('click', function() {
        navList.classList.toggle('is--visible');
      });
    });
  </script>
</body>
</html>
