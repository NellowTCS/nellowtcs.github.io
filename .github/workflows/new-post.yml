name: New Post Email

on:
  push:
    branches: [main]
    paths:
      - 'src/routes/(blog-article)/**'
  workflow_dispatch:

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'src/routes/(blog-article)/**' | paste -sd, -)
          echo "files=$changed" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Send new post email
        if: steps.changed.outputs.files != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python scripts/new_post_email.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_posts.json || true
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore(ci): update sent_posts.json [skip ci]" || true
            git push origin HEAD:main
          fi
